<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}">Luca</a>
    <nav aria-label="Primary navigation">
      <a href="{{ '/' | relative_url }}">Writing</a>
      <a href="{{ '/#topics' | relative_url }}">Research Notes</a>
      <a href="https://github.com/luca-888">GitHub</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>
</body>
</html>
