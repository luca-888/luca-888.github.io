---
layout: default
---

<article class="post">
  <header class="post-header">
    <a class="back-link" href="{{ '/' | relative_url }}">Writing</a>
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
      <p>{{ page.subtitle }}</p>
    {% endif %}
    {% if page.tags.size > 0 %}
      <div class="post-tags" aria-label="Tags">
        {% for tag in page.tags %}
          <span>{{ tag }}</span>
        {% endfor %}
      </div>
    {% endif %}
  </header>

  {% if page.image %}
    <img class="post-cover" src="{{ page.image | relative_url }}" alt="" loading="eager">
  {% endif %}

  <div class="post-content">
    {{ content }}
  </div>
</article>
